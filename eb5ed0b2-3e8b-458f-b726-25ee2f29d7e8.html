<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Scheda Lavoro — SL 7-6</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; padding: 24px 16px; background: #f8fafc; color: #0f172a; line-height: 1.5; }
    .wrap { max-width: 420px; margin: 0 auto; }
    h1 { font-size: 1.25rem; margin: 0 0 4px; }
    .sub { color: #64748b; font-size: 0.875rem; margin-bottom: 20px; }
    .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 16px; }
    .row { display: flex; justify-content: space-between; gap: 12px; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
    .row:last-child { border-bottom: none; }
    .lbl { color: #64748b; font-size: 0.8125rem; }
    .val { font-weight: 600; font-size: 0.875rem; text-align: right; }
    .stato { display: inline-block; background: #dbeafe; color: #1d4ed8; padding: 4px 10px; border-radius: 999px; font-size: 0.8125rem; }
    .note { font-size: 0.875rem; color: #475569; margin-top: 12px; white-space: pre-wrap; }
    footer { text-align: center; font-size: 0.75rem; color: #94a3b8; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Scheda Lavoro</h1>
    <p class="sub">Riferimento SL 7-6</p>
    <div class="card">
      <div class="row">
        <span class="lbl">Stato</span>
        <span class="val"><span class="stato">Accettata</span></span>
      </div>
      <p class="note">Macchina: Sega circolare DeWalt</p>
    </div>
    <footer>Aggiornato: 2026-05-19 11:17</footer>
  </div>
</body>
</html>
