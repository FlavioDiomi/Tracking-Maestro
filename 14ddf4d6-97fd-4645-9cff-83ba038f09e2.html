<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Informazioni lavoro</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; padding: 20px 14px; background: #f8fafc; color: #0f172a; line-height: 1.45; font-size: 15px; }
    .wrap { max-width: 480px; margin: 0 auto; }
    section { background: #fff; border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,.06); }
    h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: .04em; color: #64748b; margin: 0 0 10px; font-weight: 600; }
    .line { margin: 4px 0; font-size: 0.9rem; }
    .muted { color: #94a3b8; font-size: 0.875rem; }
    .pre { white-space: pre-wrap; font-size: 0.9rem; margin: 0; }
    .tbl { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    .tbl th, .tbl td { text-align: left; padding: 6px 4px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
    .tbl th { color: #64748b; font-weight: 600; font-size: 0.75rem; }
    .num { text-align: right; white-space: nowrap; width: 3rem; }
    .money-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 0.9rem; }
    .money-row strong { font-weight: 600; }
    .dates .money-row span:first-child { color: #64748b; }
  </style>
</head>
<body>
  <div class="wrap">
    <section>
      <h2>Dati macchina</h2>
      <div class="line">Tipo: Avvitatore</div><div class="line">Marca: Hilti</div>
    </section>
    <section>
      <h2>Registro lavorazioni</h2>
      <p class="pre">—</p>
    </section>
    <section>
      <h2>Ricambi</h2>
      <div class="muted">—</div>
    </section>
    <section>
      <div class="money-row"><span>Acconto</span><strong>€0.00</strong></div>
      <div class="money-row"><span>Totale da pagare</span><strong>€0.00</strong></div>
    </section>
    <section class="dates">
      <div class="money-row"><span>Data entrata</span><span>14/05/2026</span></div>
      <div class="money-row"><span>Data riparazione</span><span>—</span></div>
      <div class="money-row"><span>Data uscita</span><span>—</span></div>
    </section>
  </div>
</body>
</html>
